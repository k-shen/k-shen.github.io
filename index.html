<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="">
  <meta name="author" content="">
  <title>Kaiwen Shen</title>
  <link rel="icon" type="image/png" href="files/initials.png">
  <link href="style/bootstrap.min.css" rel="stylesheet">
  <link href="style/index.css" rel="stylesheet">
  <link href="style/scrolling-nav.css" rel="stylesheet">
</head>

<body id="page-top">
  <div id="nav"></div>
  <div id="header"></div>
  <div id="about"></div>
  <div id="experience"></div>
  <div id="education"></div>
  <div id="research"></div>
  <div id="projects"></div>
  <div id="leadership"></div>
  <div id="skills"></div>

  <script src="script/jquery.min.js"></script>
  <script src="script/bootstrap.bundle.min.js"></script>
  <script src="script/jquery.easing.min.js"></script>
  <script>
    const partials = ['nav', 'header', 'about', 'experience', 'education','research', 'projects', 'leadership', 'skills'];
    Promise.all(
      partials.map(name =>
        fetch(`sections/${name}.html`)
          .then(r => r.text())
          .then(html => document.getElementById(name).innerHTML = html)
      )
    ).then(() => {
      const script = document.createElement('script');
      script.src = 'script/scrolling-nav.js';
      document.body.appendChild(script);
    });
  </script>
</body>

</html>
